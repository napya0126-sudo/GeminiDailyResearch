<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>はせぴょんデイリーリサーチ</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="hero">
  <h1>📚 はせぴょんデイリーリサーチ</h1>
  <p>Gemini CLIが毎朝6時に調べて、朝7時には読める</p>
</div>

<!-- 曜日別スケジュール -->
<div class="schedule-grid">
  <div class="schedule-item">
    <div class="day">月</div>
    <div class="icon">🤖</div>
    <div class="label">AI・テクノロジー</div>
  </div>
  <div class="schedule-item">
    <div class="day">火</div>
    <div class="icon">🐾</div>
    <div class="label">動物・獣医DX</div>
  </div>
  <div class="schedule-item">
    <div class="day">水</div>
    <div class="icon">📊</div>
    <div class="label">SaaS・CS</div>
  </div>
  <div class="schedule-item">
    <div class="day">木</div>
    <div class="icon">🌾</div>
    <div class="label">海外農業テック</div>
  </div>
  <div class="schedule-item">
    <div class="day">金</div>
    <div class="icon">🚀</div>
    <div class="label">キャリア・成長</div>
  </div>
  <div class="schedule-item">
    <div class="day">土</div>
    <div class="icon">🌍</div>
    <div class="label">英語・グローバル</div>
  </div>
  <div class="schedule-item">
    <div class="day">日</div>
    <div class="icon">🧘</div>
    <div class="label">メンタル・習慣</div>
  </div>
</div>

<p class="section-title">最新のリサーチ</p>

<div class="entries">
<!-- ENTRIES_START -->
  <p class="empty">まだエントリーがありません。初回実行後に追加されます。</p>
<!-- ENTRIES_END -->
</div>

<footer>
  <p>Powered by Gemini CLI × Claude Code</p>
</footer>

</body>
</html>
